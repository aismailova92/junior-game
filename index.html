<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Junior Club</title>
</head>

<body style="
  margin:0;
  font-family: Arial;
  background: linear-gradient(180deg, #eaf2ff, #ffffff);
">

<div style="padding:20px;">

  <h2>👋 Hi, Amina</h2>

  <!-- CARD -->
  <div style="
    background: linear-gradient(135deg, #007BFF, #00c6ff);
    border-radius: 20px;
    padding:20px;
    color:white;
    box-shadow: 0 10px 20px rgba(0,0,0,0.1);
  ">
    <h3>💳 Junior Card</h3>
    <h1 id="points">⭐ 0</h1>
    <p>Level 1</p>
  </div>

  <br>

  <!-- STREAK -->
  <div style="
    background:white;
    padding:15px;
    border-radius:15px;
  ">
    🔥 3 day streak
  </div>

  <br>

  <!-- TASK -->
  <div style="
    background:white;
    padding:15px;
    border-radius:15px;
  ">
    🎯 Daily Task  
    <br> +20 ⭐  
    <br><br>
    <button onclick="addPoints(20)">Start 🚀</button>
  </div>

</div>

<script>
let points = 0;

function addPoints(value){
  points += value;
  document.getElementById("points").innerText = "⭐ " + points;
}
</script>

</body>
</html>
