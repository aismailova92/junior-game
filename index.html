<!DOCTYPE html>
<html>
<head>
  <title>Junior Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; text-align: center; padding: 40px;">

  <h1>🎮 Junior Club</h1>
  <h2 id="points">⭐ Points: 0</h2>

  <button onclick="tap()" style="
    padding: 20px;
    font-size: 20px;
    border-radius: 12px;
    background: #007BFF;
    color: white;
    border: none;
  ">
    TAP 🚀
  </button>

  <script>
    let points = 0;

    function tap() {
      points++;
      document.getElementById("points").innerText = "⭐ Points: " + points;
    }
  </script>

</body>
</html>
